version: "3"
services:
  # The Hub: The brain that routes test requests
  selenium-hub:
    image: selenium/hub:4.43.0
    container_name: selenium-hub
    ports:
      - "4444:4444"

  # Chrome Node: Registered to the Hub
  chrome:
    image: selenium/node-chrome:147.0-20260404
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  # Firefox Node: Registered to the Hub
  firefox:
    image: selenium/node-firefox:129.0-20260404
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443